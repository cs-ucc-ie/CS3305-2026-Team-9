{% extends "base.html" %}

{% block title %}Access Denied - ShareLink{% endblock %}

{% block main_content %}
<div class="card card-narrow center">
    <h1>403 - Access Denied</h1>
    <p>You do not have permission to access this page.</p>
    <p class="mt-2">
        {% if g.user %}
            <a href="{{ url_for('dashboard') }}" class="btn">Go to Dashboard</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn">Sign In</a>
        {% endif %}
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Home</a>
    </p>
</div>
{% endblock %}
