{% extends "base.html" %}

{% block main_content %}

    <h1>File Sharing</h1>

    {% if g.user %}
        <p>You are logged in as <strong>{{ g.user }}</strong>.</p>
        <p><a href="{{ url_for('upload') }}">Upload a file</a></p>
    {% else %}
        <p>You are not logged in.</p>
        <p><a href="{{ url_for('login') }}">Login to upload</a></p>

    {% endif %}

{% endblock %}
