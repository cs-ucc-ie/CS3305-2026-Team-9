<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}ShareLink{% endblock %}</title>
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
        <link rel="apple-touch-icon" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
        {% if g.user %}
        <meta name="csrf-token" content="{{ csrf_token() }}">
        {% endif %}
        <script>
            // Apply saved theme immediately to prevent flash of wrong theme
            (function() {
                var saved = localStorage.getItem('sharelink-theme');
                if (saved === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            })();
        </script>
    </head>
    <body>
        <header>
            <a href="{{ url_for('index') }}" class="header-brand">ShareLink</a>
            <nav class="header-nav">
                <button type="button" class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                </button>
{% if g.user %}
                <div class="header-user">
                    {% if g.profile_picture %}
                        <img src="{{ url_for('static', filename='profiles/' ~ g.profile_picture) }}"
                             class="header-avatar">
                    {% endif %}
                    <span class="header-username">{{ g.user }}</span>
                </div>
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('upload') }}">Upload</a>
                <a href="{{ url_for('logout') }}">Logout</a>
{% else %}
                <a href="{{ url_for('register') }}">Register</a>
                <a href="{{ url_for('login') }}">Login</a>
{% endif %}
            </nav>
        </header>

        <main>
        {% block main_content %}{% endblock %}
        </main>

        {% block scripts %}{% endblock %}

        {% if g.user %}
        <!-- Chat Widget -->
        <div id="chat-widget" class="chat-widget">
            <div id="chat-panel" class="chat-panel hidden">
                <div class="chat-header">
                    <span id="chat-header-title">Messages</span>
                    <button type="button" class="chat-close" onclick="toggleChat()">&times;</button>
                </div>

                <div id="chat-friends-list" class="chat-body">
                    <div id="chat-friends-container"></div>
                </div>

                <div id="chat-conversation" class="chat-body hidden">
                    <button type="button" class="chat-back" onclick="showFriendsList()">&#8592; Back</button>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div id="chat-file-picker" class="chat-file-picker hidden">
                        <select id="chat-file-select">
                            <option value="">Select a file...</option>
                        </select>
                        <button type="button" class="btn btn-sm" onclick="sendFile()">Send</button>
                        <button type="button" class="btn btn-sm btn-secondary" onclick="hideFilePicker()">Cancel</button>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type a message..."
                               onkeydown="if(event.key==='Enter')sendMessage()">
                        <button type="button" class="chat-send-btn" onclick="sendMessage()">Send</button>
                        <button type="button" class="chat-attach-btn" onclick="showFilePicker()" title="Share a file">📎</button>
                    </div>
                </div>
            </div>

            <button type="button" id="chat-toggle" class="chat-toggle" onclick="toggleChat()">
                <span class="chat-toggle-icon">💬</span>
                <span id="chat-badge" class="chat-badge hidden">0</span>
            </button>
        </div>

        <script src="{{ url_for('static', filename='chat.js') }}"></script>
        {% endif %}

        <script>
            // Theme toggle
            function toggleTheme() {
                var html = document.documentElement;
                var current = html.getAttribute('data-theme') || 'dark';
                var next = current === 'light' ? 'dark' : 'light';

                if (next === 'dark') {
                    html.removeAttribute('data-theme');
                } else {
                    html.setAttribute('data-theme', 'light');
                }
                localStorage.setItem('sharelink-theme', next);
                updateThemeIcon(next);
            }

            function updateThemeIcon(theme) {
                var icon = document.getElementById('themeIcon');
                if (icon) {
                    icon.textContent = theme === 'light' ? '☀️' : '🌙';
                }
            }

            // Set icon on page load
            (function() {
                var saved = localStorage.getItem('sharelink-theme') || 'dark';
                updateThemeIcon(saved);
            })();
        </script>
    </body>
</html>
