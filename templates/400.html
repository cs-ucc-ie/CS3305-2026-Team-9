{% extends "base.html" %}

{% block title %}Bad Request - ShareLink{% endblock %}

{% block main_content %}
<div class="card card-narrow center">
    <h1>400 - Bad Request</h1>
    <p>Your request could not be processed. Please check your input and try again.</p>
    <p class="mt-2">
        <a href="{{ url_for('index') }}" class="btn">Go Home</a>
        {% if g.user %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Dashboard</a>
        {% endif %}
    </p>
</div>
{% endblock %}
